<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // 🔥 FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDpZD3ML2VVASnCWh665vmyGYKASBaqJ2Y",
    authDomain: "mirmet-zone.firebaseapp.com",
    projectId: "mirmet-zone",
    storageBucket: "mirmet-zone.firebasestorage.app",
    messagingSenderId: "1003782331127",
    appId: "1:1003782331127:web:e21a4b1464f8c7a7a791f2"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  console.log("🔥 Firebase Connected");

  // BACK BUTTON FIX
  window.onpopstate = function () {
    safeShow("homePage");
    safeHide("registerPage");
    safeHide("adminLogin");
    safeHide("adminPanel");
  };

  function safeShow(id){
    let el = document.getElementById(id);
    if(el) el.classList.remove("hidden");
  }

  function safeHide(id){
    let el = document.getElementById(id);
    if(el) el.classList.add("hidden");
  }

  // OPEN REGISTER PAGE
  window.showRegister = function () {
    history.pushState({page:'register'}, '', '#register');
    safeHide("homePage");
    safeShow("registerPage");
  }

  // ADMIN LOGIN PAGE
  window.showAdminLogin = function () {
    history.pushState({page:'admin'}, '', '#admin');
    safeHide("homePage");
    safeShow("adminLogin");
  }

  // NEXT STEP
  window.nextStep = function () {

    let name = document.getElementById('name')?.value.trim();
    let uid = document.getElementById('uid')?.value.trim();
    let ign = document.getElementById('ign')?.value.trim();
    let whatsapp = document.getElementById('whatsapp')?.value.trim();

    if (!name || !uid || !ign || !whatsapp) {
      alert('⚠ Please fill all details');
      return;
    }

    if (whatsapp.length < 10) {
      alert('⚠ Invalid WhatsApp Number');
      return;
    }

    safeHide("step1");
    safeShow("step2");
  }

  // SUBMIT FORM
  window.submitForm = function () {

    let transaction = document.getElementById('transaction')?.value.trim();
    let screenshot = document.getElementById('screenshot')?.files.length || 0;
    let rules = document.getElementById('rules')?.checked;

    if (!transaction) {
      alert('⚠ Enter UPI Transaction ID');
      return;
    }

    if (screenshot === 0) {
      alert('⚠ Upload Payment Screenshot');
      return;
    }

    if (!rules) {
      alert('⚠ Accept Tournament Rules');
      return;
    }

    let player = {
      name: document.getElementById('name').value,
      uid: document.getElementById('uid').value,
      ign: document.getElementById('ign').value,
      whatsapp: document.getElementById('whatsapp').value,
      mode: document.getElementById('mode').value,
      transaction: transaction,
      status: "Pending Verification",
      createdAt: Date.now()
    };

    db.collection("players").add(player)
      .then(() => {
        alert("✅ Registration Submitted Successfully");
        location.reload();
      })
      .catch((err) => {
        alert("❌ Error: " + err.message);
      });
  }

  // ADMIN LOGIN
  window.loginAdmin = function () {

    let password = document.getElementById('adminPassword')?.value;

    if (password === "mirmet123") {
      safeHide("adminLogin");
      safeShow("adminPanel");
      loadPlayers();
    } else {
      alert("❌ Wrong Password");
    }
  }

  // LOAD PLAYERS
  function loadPlayers() {

    db.collection("players")
      .orderBy("createdAt", "desc")
      .get()
      .then((snap) => {

        let html = "";

        snap.forEach((doc, i) => {
          let p = doc.data();

          html += `
            <div class="bg-zinc-800 p-4 rounded-xl mb-3">
              <h3 class="text-yellow-400 font-bold">Player ${i + 1}</h3>
              <p><b>Name:</b> ${p.name}</p>
              <p><b>UID:</b> ${p.uid}</p>
              <p><b>IGN:</b> ${p.ign}</p>
              <p><b>WhatsApp:</b> ${p.whatsapp}</p>
              <p><b>Mode:</b> ${p.mode}</p>
              <p><b>Txn:</b> ${p.transaction}</p>
              <p><b>Status:</b> ${p.status}</p>
            </div>
          `;
        });

        let el = document.getElementById("playersList");
        if (el) el.innerHTML = html;

      })
      .catch(err => console.log(err));
  }

  // LOGOUT
  window.logoutAdmin = function () {
    location.reload();
  }

});
</script>
