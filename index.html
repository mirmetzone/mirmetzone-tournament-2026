<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDpZD3ML2VVASnCWh665vmyGYKASBaqJ2Y",
  authDomain: "mirmet-zone.firebaseapp.com",
  projectId: "mirmet-zone",
  storageBucket: "mirmet-zone.firebasestorage.app",
  messagingSenderId: "1003782331127",
  appId: "1:1003782331127:web:e21a4b1464f8c7a7a791f2"
};

// 🔥 Initialize Firebase
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

console.log("🔥 Firebase Connected");

// BACK BUTTON FIX
window.onpopstate = function(event){

  document.getElementById('homePage').classList.remove('hidden');

  document.getElementById('registerPage').classList.add('hidden');

  document.getElementById('adminLogin').classList.add('hidden');

  document.getElementById('adminPanel').classList.add('hidden');
}

// OPEN REGISTER PAGE
function showRegister(){

  history.pushState({page:'register'}, '', '#register');

  document.getElementById('homePage').classList.add('hidden');

  document.getElementById('registerPage').classList.remove('hidden');
}

// OPEN ADMIN LOGIN
function showAdminLogin(){

  history.pushState({page:'admin'}, '', '#admin');

  document.getElementById('homePage').classList.add('hidden');

  document.getElementById('adminLogin').classList.remove('hidden');
}

// NEXT STEP VALIDATION
function nextStep(){

  let name = document.getElementById('name').value.trim();

  let uid = document.getElementById('uid').value.trim();

  let ign = document.getElementById('ign').value.trim();

  let whatsapp = document.getElementById('whatsapp').value.trim();

  if(name === '' || uid === '' || ign === '' || whatsapp === ''){

    alert('⚠ Please fill all details');

    return;
  }

  if(whatsapp.length < 10){

    alert('⚠ Invalid WhatsApp Number');

    return;
  }

  document.getElementById('step1').classList.add('hidden');

  document.getElementById('step2').classList.remove('hidden');
}

// SUBMIT FORM
function submitForm(){

  let transaction = document.getElementById('transaction').value.trim();

  let screenshot = document.getElementById('screenshot').files.length;

  let rules = document.getElementById('rules').checked;

  if(transaction === ''){

    alert('⚠ Enter UPI Transaction ID');

    return;
  }

  if(screenshot === 0){

    alert('⚠ Upload Payment Screenshot');

    return;
  }

  if(!rules){

    alert('⚠ Accept Tournament Rules');

    return;
  }

  let player = {

    name: document.getElementById('name').value,

    uid: document.getElementById('uid').value,

    ign: document.getElementById('ign').value,

    whatsapp: document.getElementById('whatsapp').value,

    mode: document.getElementById('mode').value,

    transaction: transaction,

    status: 'Pending Verification',

    createdAt: new Date().toISOString()
  };

  // SAVE TO FIREBASE
  db.collection("players").add(player)

  .then(() => {

    alert('✅ Registration Submitted Successfully');

    location.reload();

  })

  .catch((error) => {

    alert('❌ Error: ' + error.message);

  });
}

// ADMIN LOGIN
function loginAdmin(){

  let password = document.getElementById('adminPassword').value;

  if(password === 'mirmet123'){

    document.getElementById('adminLogin').classList.add('hidden');

    document.getElementById('adminPanel').classList.remove('hidden');

    loadPlayers();

  } else {

    alert('❌ Wrong Password');
  }
}

// LOAD PLAYERS FROM FIREBASE
function loadPlayers(){

  db.collection("players")

  .orderBy("createdAt", "desc")

  .get()

  .then((querySnapshot) => {

    let html = '';

    querySnapshot.forEach((doc, index) => {

      let player = doc.data();

      html += `
        <div class="bg-zinc-800 rounded-xl p-4 mb-3">

          <h3 class="font-bold text-lg text-yellow-400">
            Player ${index + 1}
          </h3>

          <p><b>Name:</b> ${player.name}</p>

          <p><b>UID:</b> ${player.uid}</p>

          <p><b>IGN:</b> ${player.ign}</p>

          <p><b>WhatsApp:</b> ${player.whatsapp}</p>

          <p><b>Mode:</b> ${player.mode}</p>

          <p><b>Transaction ID:</b> ${player.transaction}</p>

          <p>
            <b>Status:</b>

            <span class="text-yellow-400">
              ${player.status}
            </span>
          </p>

        </div>
      `;
    });

    document.getElementById('playersList').innerHTML = html;

  })

  .catch((error) => {

    console.log(error);

  });
}

// LOGOUT
function logoutAdmin(){

  location.reload();
}

</script>
