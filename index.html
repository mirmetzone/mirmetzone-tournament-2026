<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirmet Zone Tournament</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">  <!-- Header -->  <div class="bg-gradient-to-r from-purple-700 to-pink-600 p-5 text-center shadow-lg">
    <h1 class="text-3xl font-bold">🔥 MIRMET ZONE TOURNAMENT 🔥</h1>
    <p class="mt-2 text-sm">Solo & Squad | Join Fee ₹500 | Winner ₹5000</p>
  </div>  <!-- Home Section -->  <section id="homePage" class="p-5">
    <div class="bg-zinc-900 rounded-2xl p-5 shadow-lg text-center">
      <img src="https://i.imgur.com/KJ8wQ6G.png" class="rounded-xl w-full mb-4" alt="banner"><h2 class="text-2xl font-bold text-yellow-400">Welcome To Mirmet Zone</h2>

  <div class="grid grid-cols-2 gap-3 mt-5 text-sm">
    <div class="bg-zinc-800 p-3 rounded-xl">
      <p>🏆 Winner Prize</p>
      <h3 class="font-bold text-xl text-green-400">₹5000</h3>
    </div>

    <div class="bg-zinc-800 p-3 rounded-xl">
      <p>💸 Join Fee</p>
      <h3 class="font-bold text-xl text-red-400">₹500</h3>
    </div>
  </div>

  <button onclick="showRegister()" class="mt-6 w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl text-lg font-bold">
    Register & Join
  </button>

  <!-- Hidden Admin Access -->
  <div onclick="showAdminLogin()" class="fixed bottom-2 right-2 w-6 h-6 opacity-0 z-50"></div>
</div>

  </section>  <!-- Registration Section -->  <section id="registerPage" class="hidden p-5">
    <div class="bg-zinc-900 rounded-2xl p-5 shadow-lg">
      <h2 class="text-2xl font-bold text-center mb-5">Tournament Registration</h2><div id="step1">
    <input id="name" type="text" placeholder="Full Name" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

    <input id="uid" type="text" placeholder="Free Fire UID" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

    <input id="ign" type="text" placeholder="Free Fire IGN" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

    <input id="whatsapp" type="text" placeholder="WhatsApp Number" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

    <select id="mode" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">
      <option>Solo</option>
      <option>Squad</option>
    </select>

    <button onclick="nextStep()" class="w-full bg-purple-600 py-3 rounded-xl font-bold">
      Next
    </button>
  </div>

  <div id="step2" class="hidden">
    <div class="bg-zinc-800 rounded-xl p-4 text-center mb-4">
      <h3 class="text-xl font-bold text-yellow-400">💸 Payment QR</h3>

      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay" class="mx-auto mt-3 rounded-xl" alt="QR">

      <p class="mt-3 text-sm">UPI ID: yourupi@okaxis</p>
    </div>

    <input id="transaction" type="text" placeholder="UPI Transaction ID" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

    <input id="screenshot" type="file" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

    <label class="flex items-center gap-2 mb-4 text-sm">
      <input type="checkbox" id="rules">
      I Agree To All Tournament Rules
    </label>

    <button onclick="submitForm()" class="w-full bg-green-600 py-3 rounded-xl font-bold">
      Submit Registration
    </button>
  </div>
</div>

  </section>  <!-- Admin Login -->  <section id="adminLogin" class="hidden p-5">
    <div class="bg-zinc-900 rounded-2xl p-5 shadow-lg">
      <h2 class="text-2xl font-bold text-center mb-5">Admin Login</h2><input id="adminPassword" type="password" placeholder="Enter Admin Password" class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

  <button onclick="loginAdmin()" class="w-full bg-red-600 py-3 rounded-xl font-bold">
    Login
  </button>
</div>

  </section>  <!-- Admin Panel -->  <section id="adminPanel" class="hidden p-5">
    <div class="bg-zinc-900 rounded-2xl p-5 shadow-lg">
      <div class="flex justify-between items-center mb-5">
        <h2 class="text-2xl font-bold">Admin Panel</h2><button onclick="logoutAdmin()" class="bg-red-600 px-4 py-2 rounded-xl text-sm">
      Logout
    </button>
  </div>

  <div id="playersList"></div>
</div>

  </section><script>

window.onpopstate = function(event){

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('registerPage').classList.add('hidden');
  document.getElementById('adminLogin').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('hidden');

  if(event.state && event.state.page){
    document.getElementById(event.state.page).classList.remove('hidden');
  } else {
    document.getElementById('homePage').classList.remove('hidden');
  }
}


function showRegister(){
  history.pushState({page:'registerPage'}, '', '#register');

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('registerPage').classList.remove('hidden');
}

function showAdminLogin(){
  history.pushState({page:'adminLogin'}, '', '#admin');

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('adminLogin').classList.remove('hidden');
}

function nextStep(){
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function submitForm(){

  let player = {
    name: document.getElementById('name').value,
    uid: document.getElementById('uid').value,
    ign: document.getElementById('ign').value,
    whatsapp: document.getElementById('whatsapp').value,
    mode: document.getElementById('mode').value,
    transaction: document.getElementById('transaction').value
  }

  let players = JSON.parse(localStorage.getItem('players')) || [];

  players.push(player);

  localStorage.setItem('players', JSON.stringify(players));

  alert('✅ Registration Successful!');

  location.reload();
}

function loginAdmin(){

  let password = document.getElementById('adminPassword').value;

  if(password === 'mirmet123'){

    document.getElementById('adminLogin').classList.add('hidden');

    document.getElementById('adminPanel').classList.remove('hidden');

    loadPlayers();

  } else {
    alert('Wrong Password');
  }
}

function loadPlayers(){

  let players = JSON.parse(localStorage.getItem('players')) || [];

  let html = '';

  players.forEach((player, index) => {

    html += `
      <div class="bg-zinc-800 rounded-xl p-4 mb-3">
        <h3 class="font-bold text-lg text-yellow-400">Player ${index+1}</h3>
        <p><b>Name:</b> ${player.name}</p>
        <p><b>UID:</b> ${player.uid}</p>
        <p><b>IGN:</b> ${player.ign}</p>
        <p><b>WhatsApp:</b> ${player.whatsapp}</p>
        <p><b>Mode:</b> ${player.mode}</p>
        <p><b>Transaction ID:</b> ${player.transaction}</p>
      </div>
    `;
  });

  document.getElementById('playersList').innerHTML = html;
}

function logoutAdmin(){
  location.reload();
}

</script></body>
</html>
